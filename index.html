<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VibeTrack Pro</title>
    <style>
        :root {
            --charcoal: #1a1a1a;
            --orange: #ff6600;
            --white: #ffffff;
            --grey: #262626;
        }

        body {
            background-color: var(--charcoal);
            color: var(--white);
            font-family: -apple-system, system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: env(safe-area-inset-top) 20px;
            margin: 0;
        }

        .container { width: 100%; max-width: 400px; margin-top: 20px; }
        h1 { color: var(--orange); text-align: center; letter-spacing: 2px; font-size: 28px; margin-bottom: 10px; }
        
        .progress-container {
            background: #333;
            height: 8px;
            border-radius: 4px;
            margin-bottom: 25px;
            overflow: hidden;
        }

        #progressBar {
            background: var(--orange);
            height: 100%;
            width: 0%;
            transition: width 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 10px rgba(255, 102, 0, 0.5);
        }

        .input-area {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 25px;
            background: #222;
            padding: 15px;
            border-radius: 15px;
        }

        select, input {
            background: var(--grey);
            border: 1px solid #444;
            color: white;
            padding: 15px; /* Bigger for touch */
            border-radius: 10px;
            font-size: 16px;
            outline: none;
        }

        button#add-btn {
            background: var(--orange);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        .habit-item {
            background: var(--grey);
            padding: 18px;
            border-radius: 15px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 5px solid var(--orange);
        }

        .habit-item.completed { opacity: 0.3; border-left-color: #444; }
        .check-btn { background: none; border: 2px solid var(--orange); color: var(--orange); border-radius: 10px; width: 40px; height: 40px; font-size: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>VIBETRACK</h1>
        
        <div class="progress-container">
            <div id="progressBar"></div>
        </div>

        <div class="input-area">
            <select id="habitSelect">
                <option value="">Choose a habit...</option>
                <option value="💧 Drink Water">💧 Drink Water</option>
                <option value="📖 Read 10 Pages">📖 Read 10 Pages</option>
                <option value="🧘 Meditation">🧘 Meditation</option>
                <option value="🏋️ Workout">🏋️ Workout</option>
                <option value="🍎 Eat Healthy">🍎 Eat Healthy</option>
                <option value="CUSTOM">➕ Custom...</option>
            </select>

            <input type="text" id="habitInput" placeholder="Enter custom habit name..." style="display:none;">
            
            <button id="add-btn">ADD HABIT</button>
        </div>

        <div id="habitList"></div>
    </div>

    <script>
        const select = document.getElementById('habitSelect');
        const input = document.getElementById('habitInput');
        const btn = document.getElementById('add-btn');
        const list = document.getElementById('habitList');
        const prog = document.getElementById('progressBar');

        let habits = JSON.parse(localStorage.getItem('vibeHabits')) || [];

        select.addEventListener('change', () => {
            if (select.value === 'CUSTOM') {
                input.style.display = 'block';
                input.focus();
            } else {
                input.style.display = 'none';
            }
        });

        function updateProgress() {
            if (habits.length === 0) { prog.style.width = '0%'; return; }
            const done = habits.filter(h => h.completed).length;
            prog.style.width = ((done / habits.length) * 100) + '%';
        }

        function render() {
            list.innerHTML = '';
            habits.forEach((h, i) => {
                const el = document.createElement('div');
                el.className = `habit-item ${h.completed ? 'completed' : ''}`;
                el.innerHTML = `<span>${h.text}</span><button class="check-btn" onclick="toggle(${i})">${h.completed ? '✓' : ''}</button>`;
                list.appendChild(el);
            });
            localStorage.setItem('vibeHabits', JSON.stringify(habits));
            updateProgress();
        }

        btn.onclick = () => {
            let habitText = "";

            if (select.value === 'CUSTOM') {
                habitText = input.value.trim();
            } else if (select.value !== "") {
                habitText = select.value;
            }

            if (habitText) {
                habits.push({text: habitText, completed: false});
                // Reset inputs
                input.value = '';
                select.value = '';
                input.style.display = 'none';
                render();
            }
        };

        window.toggle = (i) => {
            habits[i].completed = !habits[i].completed;
            render();
        };

        render();
    </script>
</body>
</html>
