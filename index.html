<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VibeTrack Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg: #121212;
            --container-bg: rgba(28, 28, 28, 0.9);
            --item-bg: rgba(255, 255, 255, 0.05);
            --text: #ffffff;
            --orange: #ff6600;
            --border: rgba(255, 255, 255, 0.1);
            --overlay: rgba(0, 0, 0, 0.5);
        }

        [data-theme="light"] {
            --bg: #f8f9fa;
            --container-bg: rgba(255, 255, 255, 0.95);
            --item-bg: rgba(0, 0, 0, 0.03);
            --text: #1a1a1a;
            --border: rgba(0, 0, 0, 0.08);
            --overlay: rgba(255, 255, 255, 0.2);
        }

        body {
            background-color: var(--bg);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: env(safe-area-inset-top) 20px 40px 20px;
            margin: 0;
            transition: all 0.4s ease;
        }

        body.has-photo::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--overlay);
            z-index: -1;
        }

        .container { 
            width: 100%; 
            max-width: 400px; 
            z-index: 10; 
            margin-top: 40px;
            background: var(--container-bg); 
            padding: 30px; 
            border-radius: 32px; 
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px); 
            border: 1px solid var(--border); 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            box-sizing: border-box;
        }

        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 25px;
        }

        h1 { 
            color: var(--orange); 
            letter-spacing: 2px; 
            font-size: 20px; 
            margin: 0; 
            font-weight: 800;
            text-transform: uppercase;
        }

        .streak-display {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
            font-size: 15px;
            color: var(--orange);
        }

        .progress-bar-wrap { 
            background: var(--item-bg); 
            height: 6px; 
            border-radius: 10px; 
            margin-bottom: 30px; 
            overflow: hidden; 
        }

        #progressBar { 
            background: var(--orange); 
            height: 100%; width: 0%; 
            transition: width 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); 
        }

        select, input { 
            background: var(--item-bg); 
            border: 1px solid var(--border); 
            color: var(--text); 
            padding: 14px; 
            border-radius: 14px; 
            width: 100%; 
            box-sizing: border-box; 
            margin-bottom: 12px; 
            font-size: 15px;
            outline: none;
            -webkit-appearance: none;
        }

        #add-btn { 
            background: var(--orange); 
            color: white; 
            border: none; 
            padding: 14px; 
            border-radius: 14px; 
            width: 100%; 
            font-weight: 700; 
            font-size: 14px;
            cursor: pointer;
            margin-bottom: 25px;
        }

        .habit-item { 
            background: var(--item-bg); 
            padding: 16px; 
            border-radius: 18px; 
            margin-bottom: 10px; 
            display: flex; 
            align-items: center; 
            border: 1px solid var(--border); 
            transition: opacity 0.3s;
        }

        .habit-text { flex-grow: 1; margin-left: 14px; font-size: 15px; font-weight: 400; }
        .habit-item.completed { opacity: 0.35; }

        /* Minimal Line Checkbox */
        .check-btn { 
            width: 24px; height: 24px; 
            border: 2px solid var(--border); 
            border-radius: 7px; 
            background: none;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        .completed .check-btn {
            background: var(--orange);
            border-color: var(--orange);
        }

        /* Minimal Line Icons (SVG) */
        .icon-svg { fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

        .footer { margin-top: 30px; display: flex; gap: 15px; }
        .icon-toggle {
            background: var(--container-bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px;
            border-radius: 50%;
            width: 44px; height: 44px;
            display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
    </style>
</head>
<body id="mainBody">

    <div class="container">
        <div class="header">
            <h1>VibeTrack</h1>
            <div class="streak-display">
                <svg class="icon-svg" width="18" height="18" viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
                <span id="streakNum">0</span>
            </div>
        </div>

        <div class="progress-bar-wrap"><div id="progressBar"></div></div>
        
        <div class="input-section">
            <select id="hSelect">
                <option value="">Select Habit</option>
                <option value="Hydration">Hydration</option>
                <option value="Reading">Reading</option>
                <option value="Exercise">Exercise</option>
                <option value="Meditation">Meditation</option>
                <option value="CUSTOM">Custom</option>
            </select>
            <input type="text" id="hInput" style="display:none;" placeholder="New Habit...">
            <button id="add-btn">Add Habit</button>
        </div>

        <div id="hList"></div>
    </div>

    <div class="footer">
        <button class="icon-toggle" onclick="toggleTheme()">
            <svg class="icon-svg" width="20" height="20" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        </button>
        <button class="icon-toggle" onclick="togglePhoto()">
            <svg class="icon-svg" width="20" height="20" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
        </button>
        <button class="icon-toggle" onclick="resetDay()">
            <svg class="icon-svg" width="20" height="20" viewBox="0 0 24 24"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
        </button>
    </div>

    <script>
        let habits = JSON.parse(localStorage.getItem('vibeHabits')) || [];
        let theme = localStorage.getItem('vibeTheme') || 'dark';
        let usePhoto = localStorage.getItem('vibePhoto') === 'true';
        let streak = parseInt(localStorage.getItem('vibeStreak')) || 0;
        let lastCompletionDate = localStorage.getItem('vibeLastDate') || "";

        function updateUI() {
            document.documentElement.setAttribute('data-theme', theme);
            const body = document.getElementById('mainBody');
            if (usePhoto) {
                body.classList.add('has-photo');
                body.style.backgroundImage = `url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=1600&q=80')`;
            } else {
                body.classList.remove('has-photo');
                body.style.backgroundImage = 'none';
            }
            document.getElementById('streakNum').innerText = streak;
        }

        function checkStreak(fullCompletion) {
            const today = new Date().toDateString();
            if (fullCompletion && lastCompletionDate !== today) {
                const yesterday = new Date();
                yesterday.setDate(yesterday.getDate() - 1);
                
                if (lastCompletionDate === yesterday.toDateString()) {
                    streak++;
                } else if (lastCompletionDate === "") {
                    streak = 1;
                }
                lastCompletionDate = today;
                localStorage.setItem('vibeStreak', streak);
                localStorage.setItem('vibeLastDate', lastCompletionDate);
            }
            updateUI();
        }

        function toggleTheme() { theme = theme === 'dark' ? 'light' : 'dark'; localStorage.setItem('vibeTheme', theme); updateUI(); }
        function togglePhoto() { usePhoto = !usePhoto; localStorage.setItem('vibePhoto', usePhoto); updateUI(); }

        const hSelect = document.getElementById('hSelect');
        const hInput = document.getElementById('hInput');
        hSelect.onchange = () => hInput.style.display = hSelect.value === 'CUSTOM' ? 'block' : 'none';

        document.getElementById('add-btn').onclick = () => {
            let val = hSelect.value === 'CUSTOM' ? hInput.value : hSelect.value;
            if(val && val !== 'Select Habit') { 
                habits.push({text: val, completed: false}); 
                render(); 
                hInput.value=''; hSelect.value=''; hInput.style.display='none'; 
            }
        };

        function render() {
            const list = document.getElementById('hList');
            list.innerHTML = '';
            habits.forEach((h, i) => {
                const el = document.createElement('div');
                el.className = `habit-item ${h.completed ? 'completed' : ''}`;
                el.innerHTML = `
                    <button class="check-btn" onclick="toggle(${i})">
                        ${h.completed ? '<svg class="icon-svg" style="color:white" width="14" height="14" viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>' : ''}
                    </button>
                    <span class="habit-text">${h.text}</span>
                    <button style="background:none; border:none; color:#666; cursor:pointer;" onclick="removeHabit(${i})">✕</button>
                `;
                list.appendChild(el);
            });
            const done = habits.filter(h => h.completed).length;
            const percent = habits.length ? (done/habits.length)*100 : 0;
            document.getElementById('progressBar').style.width = percent + '%';
            
            if(percent === 100 && habits.length > 0) {
                confetti({particleCount:100, spread:50, origin:{y:0.8}, colors:['#ff6600']});
                checkStreak(true);
            }
            localStorage.setItem('vibeHabits', JSON.stringify(habits));
        }

        window.toggle = (i) => { habits[i].completed = !habits[i].completed; render(); };
        window.removeHabit = (i) => { if(confirm("Remove habit?")) { habits.splice(i, 1); render(); } };
        window.resetDay = () => { habits.forEach(h => h.completed = false); render(); };

        updateUI();
        render();
    </script>
</body>
</html>
