<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VibeTrack Pro</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://img.icons8.com/ios-filled/512/ff6600/flash-on.png">

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --bg: #0c0c0c;
            --container-bg: rgba(24, 24, 24, 0.85);
            --item-bg: rgba(255, 255, 255, 0.04);
            --text: #ffffff;
            --orange: #ff6600;
            --border: rgba(255, 255, 255, 0.1);
            --overlay: rgba(0, 0, 0, 0.55);
        }

        [data-theme="light"] {
            --bg: #f2f2f7;
            --container-bg: rgba(255, 255, 255, 0.9);
            --item-bg: rgba(0, 0, 0, 0.03);
            --text: #1c1c1e;
            --border: rgba(0, 0, 0, 0.08);
            --overlay: rgba(255, 255, 255, 0.2);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        body {
            background-color: var(--bg);
            background-size: cover; background-position: center; background-attachment: fixed;
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; padding: env(safe-area-inset-top) 20px 40px 20px; margin: 0;
            transition: background 0.5s ease;
        }

        body.has-photo::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--overlay); z-index: -1;
        }

        .container { 
            width: 100%; max-width: 420px; z-index: 10; margin-top: 40px;
            background: var(--container-bg); padding: 30px; border-radius: 35px; 
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); 
            border: 1px solid var(--border); box-shadow: 0 30px 60px rgba(0,0,0,0.4);
        }

        /* LOGO: 200% SIZE & NO SPACE */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .logo-wrap { display: flex; align-items: center; gap: 0px; }
        .logo-icon { fill: var(--orange); width: 44px; height: 44px; }
        .logo-text { color: var(--text); font-size: 42px; font-weight: 400; letter-spacing: -2px; margin: 0; line-height: 1; }
        .logo-highlight { color: var(--orange); font-weight: 900; text-transform: uppercase; letter-spacing: -1px; }

        .streak-display { display: flex; align-items: center; gap: 6px; color: var(--orange); font-weight: 700; font-size: 18px; }

        .progress-bar-wrap { background: var(--item-bg); height: 6px; border-radius: 10px; margin-bottom: 30px; overflow: hidden; }
        #progressBar { background: var(--orange); height: 100%; width: 0%; transition: width 0.8s ease; }

        select, input, #add-btn { 
            background: var(--item-bg); border: 1px solid var(--border); color: var(--text); 
            padding: 16px; border-radius: 16px; width: 100%; font-size: 16px; outline: none; margin-bottom: 10px;
        }
        #add-btn { background: var(--orange); color: white; font-weight: 800; border: none; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; margin-top: 5px; }

        /* CLEAN LINE HABITS */
        .habit-item { 
            background: var(--item-bg); padding: 18px; border-radius: 20px; margin-bottom: 12px; 
            display: flex; align-items: center; border: 1px solid var(--border); 
            animation: slideIn 0.3s ease backwards;
        }
        .habit-icon-wrap { color: var(--text); opacity: 0.8; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; }
        .habit-text { flex-grow: 1; margin-left: 15px; font-weight: 500; font-size: 17px; }
        .habit-item.completed { opacity: 0.25; filter: grayscale(1); }

        .check-btn { 
            width: 28px; height: 28px; border: 2px solid var(--border); border-radius: 9px; 
            background: none; display: flex; align-items: center; justify-content: center; transition: 0.2s;
        }
        .completed .check-btn { background: var(--orange); border-color: var(--orange); }

        .footer { margin-top: 30px; display: flex; gap: 20px; }
        .icon-toggle {
            background: var(--container-bg); border: 1px solid var(--border); color: var(--text);
            width: 52px; height: 52px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(10px); cursor: pointer;
        }
    </style>
</head>
<body id="mainBody">

    <div class="container">
        <div class="header">
            <div class="logo-wrap">
                <svg class="logo-icon" viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
                <h1 class="logo-text"><span class="logo-highlight">VIBE</span>track</h1>
            </div>
            <div class="streak-display">
                <i data-lucide="zap" style="width:18px; fill:var(--orange); color:var(--orange)"></i>
                <span id="streakNum">0</span>
            </div>
        </div>

        <div class="progress-bar-wrap"><div id="progressBar"></div></div>
        
        <div class="input-section">
            <select id="hSelect">
                <option value="">Choose Habit</option>
                <option value="droplets|Hydration">Hydration</option>
                <option value="book-open|Reading">Reading</option>
                <option value="flower-2|Meditation">Meditation</option>
                <option value="dumbbell|Training">Training</option>
                <option value="sparkles|CUSTOM">Custom...</option>
            </select>
            <input type="text" id="hInput" style="display:none;" placeholder="Habit name...">
            <button id="add-btn">ADD TO ROUTINE</button>
        </div>

        <div id="hList"></div>
    </div>

    <div class="footer">
        <button class="icon-toggle" onclick="toggleTheme()"><i data-lucide="moon"></i></button>
        <button class="icon-toggle" onclick="togglePhoto()"><i data-lucide="image"></i></button>
        <button class="icon-toggle" onclick="resetDay()"><i data-lucide="rotate-ccw"></i></button>
    </div>

    <script>
        let habits = JSON.parse(localStorage.getItem('vibeHabits')) || [];
        let theme = localStorage.getItem('vibeTheme') || 'dark';
        let usePhoto = localStorage.getItem('vibePhoto') === 'true';
        let streak = parseInt(localStorage.getItem('vibeStreak')) || 0;

        function updateUI() {
            document.documentElement.setAttribute('data-theme', theme);
            const body = document.getElementById('mainBody');
            if (usePhoto) {
                body.classList.add('has-photo');
                body.style.backgroundImage = `url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=1600&q=80')`;
            } else {
                body.classList.remove('has-photo');
                body.style.backgroundImage = 'none';
            }
            document.getElementById('streakNum').innerText = streak;
            lucide.createIcons();
        }

        const hSelect = document.getElementById('hSelect');
        const hInput = document.getElementById('hInput');
        hSelect.onchange = () => hInput.style.display = hSelect.value.includes('CUSTOM') ? 'block' : 'none';

        document.getElementById('add-btn').onclick = () => {
            let val = hSelect.value;
            if(!val) return;
            let icon, text;
            if(val.includes('CUSTOM')) { icon = "sparkles"; text = hInput.value || "New Habit"; }
            else { [icon, text] = val.split('|'); }
            
            habits.push({icon: icon, text: text, completed: false}); 
            render(); 
            hInput.value=''; hSelect.value=''; hInput.style.display='none'; 
        };

        function render() {
            const list = document.getElementById('hList');
            list.innerHTML = '';
            habits.forEach((h, i) => {
                const el = document.createElement('div');
                el.className = `habit-item ${h.completed ? 'completed' : ''}`;
                el.style.animationDelay = (i * 0.05) + 's';
                el.innerHTML = `
                    <button class="check-btn" onclick="toggle(${i})">
                        ${h.completed ? '<i data-lucide="check" style="color:white; width:16px; height:16px;"></i>' : ''}
                    </button>
                    <div class="habit-icon-wrap"><i data-lucide="${h.icon || 'circle'}"></i></div>
                    <span class="habit-text">${h.text}</span>
                    <button style="background:none; border:none; color:#666; cursor:pointer;" onclick="removeHabit(${i})"><i data-lucide="x" style="width:16px;"></i></button>
                `;
                list.appendChild(el);
            });
            const done = habits.filter(h => h.completed).length;
            const percent = habits.length ? (done/habits.length)*100 : 0;
            document.getElementById('progressBar').style.width = percent + '%';
            if(percent === 100 && habits.length > 0) confetti({particleCount:80, spread:60, origin:{y:0.7}, colors:['#ff6600']});
            localStorage.setItem('vibeHabits', JSON.stringify(habits));
            lucide.createIcons();
        }

        window.toggle = (i) => { habits[i].completed = !habits[i].completed; render(); };
        window.removeHabit = (i) => { habits.splice(i, 1); render(); };
        window.toggleTheme = () => { theme = theme === 'dark' ? 'light' : 'dark'; localStorage.setItem('vibeTheme', theme); updateUI(); };
        window.togglePhoto = () => { usePhoto = !usePhoto; localStorage.setItem('vibePhoto', usePhoto); updateUI(); };
        window.resetDay = () => { habits.forEach(h => h.completed = false); render(); };

        updateUI();
        render();
    </script>
</body>
</html>
