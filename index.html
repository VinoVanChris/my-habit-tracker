<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VibeTrack Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg: #1a1a1a;
            --container-bg: rgba(30, 30, 30, 0.85);
            --item-bg: rgba(45, 45, 45, 0.7);
            --text: #ffffff;
            --orange: #ff6600;
            --border: rgba(255, 255, 255, 0.1);
            --overlay: rgba(0, 0, 0, 0.5);
        }

        [data-theme="light"] {
            --bg: #f5f5f7;
            --container-bg: rgba(255, 255, 255, 0.9);
            --item-bg: rgba(240, 240, 240, 0.8);
            --text: #1a1a1a;
            --border: rgba(0, 0, 0, 0.08);
            --overlay: rgba(255, 255, 255, 0.2);
        }

        body {
            background-color: var(--bg);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text);
            font-family: -apple-system, system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: env(safe-area-inset-top) 20px 40px 20px;
            margin: 0;
            transition: all 0.4s ease;
        }

        body.has-photo::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--overlay);
            z-index: -1;
        }

        /* THE MAIN WRAPPER CARD */
        .container { 
            width: 100%; 
            max-width: 420px; 
            z-index: 10; 
            margin-top: 20px;
            background: var(--container-bg); 
            padding: 25px; 
            border-radius: 30px; 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px); 
            border: 1px solid var(--border); 
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            box-sizing: border-box;
        }

        /* HEADER INSIDE THE CARD */
        .header-row { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 20px;
        }

        h1 { 
            color: var(--orange); 
            letter-spacing: 3px; 
            font-size: 24px; 
            margin: 0; 
            font-weight: 900;
        }

        .theme-toggle { 
            background: var(--item-bg); 
            border: 1px solid var(--border); 
            color: var(--text); 
            padding: 8px 12px; 
            border-radius: 12px; 
            font-size: 16px;
        }

        .progress-container { 
            background: rgba(0,0,0,0.1); 
            height: 10px; 
            border-radius: 5px; 
            margin-bottom: 25px; 
            overflow: hidden; 
            border: 1px solid var(--border);
        }

        #progressBar { 
            background: var(--orange); 
            height: 100%; width: 0%; 
            transition: width 0.5s ease; 
        }

        .input-section { margin-bottom: 25px; }

        select, input { 
            background: var(--item-bg); 
            border: 1px solid var(--border); 
            color: var(--text); 
            padding: 15px; 
            border-radius: 12px; 
            width: 100%; 
            box-sizing: border-box; 
            margin-bottom: 12px; 
            font-size: 16px;
            -webkit-appearance: none;
        }

        #add-btn { 
            background: var(--orange); 
            color: white; 
            border: none; 
            padding: 16px; 
            border-radius: 12px; 
            width: 100%; 
            font-weight: bold; 
            letter-spacing: 1px;
            font-size: 14px;
        }

        /* HABIT ITEMS */
        .habit-item { 
            background: var(--item-bg); 
            padding: 16px; 
            border-radius: 18px; 
            margin-bottom: 12px; 
            display: flex; 
            align-items: center; 
            border: 1px solid var(--border); 
        }

        .habit-text { flex-grow: 1; margin-left: 15px; font-size: 16px; }
        .habit-item.completed { opacity: 0.4; }

        .check-btn { 
            border: 2px solid var(--orange); 
            background: none; 
            color: var(--orange); 
            border-radius: 10px; 
            width: 32px; height: 32px; 
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
        }

        .del-btn { background: none; border: none; color: #ff4444; font-size: 16px; padding-left: 10px; }

        /* FOOTER OUTSIDE THE CARD */
        .footer-controls { margin-top: 30px; display: flex; flex-direction: column; gap: 12px; align-items: center; }
        .toggle-btn { 
            background: var(--container-bg); 
            color: var(--text); 
            border: 1px solid var(--border); 
            padding: 10px 20px; 
            border-radius: 20px; 
            font-size: 12px; 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
    </style>
</head>
<body id="mainBody">

    <div class="container">
        <div class="header-row">
            <h1>VIBETRACK</h1>
            <button class="theme-toggle" onclick="toggleTheme()" id="tBtn">🌙</button>
        </div>

        <div class="progress-container"><div id="progressBar"></div></div>
        
        <div class="input-section">
            <select id="hSelect">
                <option value="">Choose a habit...</option>
                <option value="💧 Drink Water">💧 Drink Water</option>
                <option value="📖 Read 10 Pages">📖 Read 10 Pages</option>
                <option value="🧘 Meditation">🧘 Meditation</option>
                <option value="🏋️ Workout">🏋️ Workout</option>
                <option value="CUSTOM">➕ Custom...</option>
            </select>
            <input type="text" id="hInput" style="display:none;" placeholder="Habit name...">
            <button id="add-btn">ADD HABIT</button>
        </div>

        <div id="hList"></div>
    </div>

    <div class="footer-controls">
        <button class="toggle-btn" onclick="togglePhoto()">🖼 Photo BG: <span id="photoStatus">OFF</span></button>
        <button class="toggle-btn" onclick="resetDay()">Reset Checks</button>
    </div>

    <script>
        let habits = JSON.parse(localStorage.getItem('vibeHabits')) || [];
        let theme = localStorage.getItem('vibeTheme') || 'dark';
        let usePhoto = localStorage.getItem('vibePhoto') === 'true';

        function updateUI() {
            document.documentElement.setAttribute('data-theme', theme);
            document.getElementById('tBtn').innerText = theme === 'dark' ? '🌙' : '☀️';
            document.getElementById('photoStatus').innerText = usePhoto ? 'ON' : 'OFF';
            
            const body = document.getElementById('mainBody');
            if (usePhoto) {
                body.classList.add('has-photo');
                body.style.backgroundImage = `url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=1600&q=80')`;
            } else {
                body.classList.remove('has-photo');
                body.style.backgroundImage = 'none';
            }
        }

        function toggleTheme() {
            theme = theme === 'dark' ? 'light' : 'dark';
            localStorage.setItem('vibeTheme', theme);
            updateUI();
        }

        function togglePhoto() {
            usePhoto = !usePhoto;
            localStorage.setItem('vibePhoto', usePhoto);
            updateUI();
        }

        const hSelect = document.getElementById('hSelect');
        const hInput = document.getElementById('hInput');
        hSelect.onchange = () => hInput.style.display = hSelect.value === 'CUSTOM' ? 'block' : 'none';

        document.getElementById('add-btn').onclick = () => {
            let val = hSelect.value === 'CUSTOM' ? hInput.value : hSelect.value;
            if(val) { habits.push({text: val, completed: false}); render(); hInput.value=''; hSelect.value=''; hInput.style.display='none'; }
        };

        function render() {
            const list = document.getElementById('hList');
            list.innerHTML = '';
            habits.forEach((h, i) => {
                const el = document.createElement('div');
                el.className = `habit-item ${h.completed ? 'completed' : ''}`;
                el.innerHTML = `<button class="check-btn" onclick="toggle(${i})">${h.completed ? '✓' : ''}</button><span class="habit-text">${h.text}</span><button class="del-btn" onclick="removeHabit(${i})">✕</button>`;
                list.appendChild(el);
            });
            const done = habits.filter(h => h.completed).length;
            document.getElementById('progressBar').style.width = (habits.length ? (done/habits.length)*100 : 0) + '%';
            if(done === habits.length && habits.length > 0) confetti({particleCount:150, spread:70, origin:{y:0.6}});
            localStorage.setItem('vibeHabits', JSON.stringify(habits));
        }

        window.toggle = (i) => { habits[i].completed = !habits[i].completed; render(); };
        window.removeHabit = (i) => { if(confirm("Delete?")) { habits.splice(i, 1); render(); } };
        window.resetDay = () => { habits.forEach(h => h.completed = false); render(); };

        updateUI();
        render();
    </script>
</body>
</html>
