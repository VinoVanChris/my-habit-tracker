<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VibeTrack Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg: #1a1a1a;
            --container-bg: rgba(34, 34, 34, 0.9);
            --item-bg: rgba(38, 38, 38, 0.8);
            --text: #ffffff;
            --orange: #ff6600;
            --border: #444;
            --overlay: rgba(0,0,0,0.4);
        }

        [data-theme="light"] {
            --bg: #f5f5f7;
            --container-bg: rgba(255, 255, 255, 0.9);
            --item-bg: rgba(238, 238, 238, 0.8);
            --text: #1a1a1a;
            --border: #cccccc;
            --overlay: rgba(255,255,255,0.2);
        }

        body {
            background-color: var(--bg);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text);
            font-family: -apple-system, system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: env(safe-area-inset-top) 20px 40px 20px;
            margin: 0;
            transition: all 0.5s ease;
        }

        /* This creates a "tint" over the photo so you can still read the text */
        body.has-photo::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--overlay);
            z-index: -1;
        }

        .header-row { display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 400px; margin-top: 20px; z-index: 10; }
        .theme-toggle { background: var(--item-bg); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 12px; font-size: 18px; backdrop-filter: blur(5px); }
        .container { width: 100%; max-width: 400px; z-index: 10; }
        h1 { color: var(--orange); letter-spacing: 2px; font-size: 28px; margin: 0; text-shadow: 0 2px 10px rgba(0,0,0,0.3); }
        
        .progress-container { background: var(--border); height: 10px; border-radius: 5px; margin: 20px 0; overflow: hidden; }
        #progressBar { background: var(--orange); height: 100%; width: 0%; transition: width 0.4s ease; }

        .input-area { background: var(--container-bg); padding: 15px; border-radius: 15px; backdrop-filter: blur(10px); border: 1px solid var(--border); margin-bottom: 20px; }
        select, input { background: var(--item-bg); border: 1px solid var(--border); color: var(--text); padding: 12px; border-radius: 10px; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        #add-btn { background: var(--orange); color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: bold; }

        .habit-item { background: var(--container-bg); padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; align-items: center; backdrop-filter: blur(10px); border: 1px solid var(--border); }
        .habit-text { flex-grow: 1; margin-left: 15px; }
        .check-btn { border: 2px solid var(--orange); background: none; color: var(--orange); border-radius: 10px; width: 35px; height: 35px; font-size: 18px; }

        .footer-controls { margin-top: 30px; display: flex; flex-direction: column; gap: 10px; align-items: center; }
        .toggle-btn { background: var(--item-bg); color: var(--text); border: 1px solid var(--border); padding: 10px 20px; border-radius: 20px; font-size: 12px; backdrop-filter: blur(5px); }
    </style>
</head>
<body id="mainBody">

    <div class="header-row">
        <h1>VIBETRACK</h1>
        <button class="theme-toggle" onclick="toggleTheme()" id="tBtn">🌙</button>
    </div>

    <div class="container">
        <div class="progress-container"><div id="progressBar"></div></div>
        <div class="input-area">
            <select id="hSelect"><option value="">Choose a habit...</option><option value="🧘 Meditation">🧘 Meditation</option><option value="🏋️ Workout">🏋️ Workout</option><option value="CUSTOM">➕ Custom...</option></select>
            <input type="text" id="hInput" style="display:none;" placeholder="Name...">
            <button id="add-btn">ADD HABIT</button>
        </div>
        <div id="hList"></div>

        <div class="footer-controls">
            <button class="toggle-btn" onclick="togglePhoto()">🖼 Photo BG: <span id="photoStatus">OFF</span></button>
            <button class="toggle-btn" onclick="resetDay()">Reset Checks</button>
        </div>
    </div>

    <script>
        let habits = JSON.parse(localStorage.getItem('vibeHabits')) || [];
        let theme = localStorage.getItem('vibeTheme') || 'dark';
        let usePhoto = localStorage.getItem('vibePhoto') === 'true';

        function updateUI() {
            document.documentElement.setAttribute('data-theme', theme);
            document.getElementById('tBtn').innerText = theme === 'dark' ? '🌙' : '☀️';
            document.getElementById('photoStatus').innerText = usePhoto ? 'ON' : 'OFF';
            
            const body = document.getElementById('mainBody');
            if (usePhoto) {
                body.classList.add('has-photo');
                // The API call: fetches a 1600x900 photo based on theme keywords
                const keyword = theme === 'dark' ? 'night,city' : 'mountain,day';
                body.style.backgroundImage = `url('https://images.unsplash.com/photo-1534067783941-51c9c23ecefd?auto=format&fit=crop&w=1000&q=80')`; 
                // Note: For a truly random one, use: `url('https://source.unsplash.com/1600x900/?${keyword}')`
                // But Unsplash Source is being deprecated, so we use a high-quality static test one first!
            } else {
                body.classList.remove('has-photo');
                body.style.backgroundImage = 'none';
            }
        }

        function toggleTheme() {
            theme = theme === 'dark' ? 'light' : 'dark';
            localStorage.setItem('vibeTheme', theme);
            updateUI();
        }

        function togglePhoto() {
            usePhoto = !usePhoto;
            localStorage.setItem('vibePhoto', usePhoto);
            updateUI();
        }

        // Logic for adding/rendering remains the same
        const hSelect = document.getElementById('hSelect');
        const hInput = document.getElementById('hInput');
        hSelect.onchange = () => hInput.style.display = hSelect.value === 'CUSTOM' ? 'block' : 'none';

        document.getElementById('add-btn').onclick = () => {
            let val = hSelect.value === 'CUSTOM' ? hInput.value : hSelect.value;
            if(val) { habits.push({text: val, completed: false}); render(); hInput.value=''; hSelect.value=''; hInput.style.display='none'; }
        };

        function render() {
            const list = document.getElementById('hList');
            list.innerHTML = '';
            habits.forEach((h, i) => {
                const el = document.createElement('div');
                el.className = `habit-item ${h.completed ? 'completed' : ''}`;
                el.innerHTML = `<button class="check-btn" onclick="toggle(${i})">${h.completed ? '✓' : ''}</button><span class="habit-text">${h.text}</span>`;
                list.appendChild(el);
            });
            const done = habits.filter(h => h.completed).length;
            document.getElementById('progressBar').style.width = (habits.length ? (done/habits.length)*100 : 0) + '%';
            if(done === habits.length && habits.length > 0) confetti({particleCount:100, spread:70, origin:{y:0.6}});
            localStorage.setItem('vibeHabits', JSON.stringify(habits));
        }

        window.toggle = (i) => { habits[i].completed = !habits[i].completed; render(); };
        window.resetDay = () => { habits.forEach(h => h.completed = false); render(); };

        updateUI();
        render();
    </script>
</body>
</html>
