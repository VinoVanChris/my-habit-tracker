<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VibeTrack Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        /* CSS VARIABLES - This makes switching themes easy */
        :root {
            --bg: #1a1a1a;
            --container-bg: #222;
            --item-bg: #262626;
            --text: #ffffff;
            --orange: #ff6600;
            --red: #ff4444;
            --border: #444;
        }

        /* LIGHT MODE COLORS */
        [data-theme="light"] {
            --bg: #f5f5f7;
            --container-bg: #ffffff;
            --item-bg: #eeeeee;
            --text: #1a1a1a;
            --border: #cccccc;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: env(safe-area-inset-top) 20px 40px 20px;
            margin: 0;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 400px;
            margin-top: 20px;
        }

        .theme-toggle {
            background: var(--item-bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 12px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 18px;
        }

        .container { width: 100%; max-width: 400px; }
        h1 { color: var(--orange); letter-spacing: 2px; font-size: 28px; margin: 0; }
        
        .progress-container {
            background: var(--border);
            height: 12px;
            border-radius: 6px;
            margin: 20px 0;
            overflow: hidden;
        }

        #progressBar {
            background: linear-gradient(90deg, var(--orange), #ff9900);
            height: 100%;
            width: 0%;
            transition: width 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .input-area {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 25px;
            background: var(--container-bg);
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        select, input {
            background: var(--item-bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 15px;
            border-radius: 10px;
            font-size: 16px;
        }

        button#add-btn {
            background: var(--orange);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
        }

        .habit-item {
            background: var(--container-bg);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            border-left: 5px solid var(--orange);
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .habit-text { flex-grow: 1; margin-left: 15px; font-size: 17px; }
        .habit-item.completed { opacity: 0.5; border-left-color: var(--border); }

        .check-btn { 
            background: none; 
            border: 2px solid var(--orange); 
            color: var(--orange); 
            border-radius: 12px; 
            width: 40px; height: 40px; 
            font-size: 20px;
        }

        .del-btn { background: none; border: none; color: var(--red); font-weight: bold; padding: 10px; }
        .reset-btn { background: none; border: 1px solid var(--border); color: var(--text); padding: 10px 20px; border-radius: 20px; font-size: 12px; margin-top: 20px; }

    </style>
</head>
<body>

    <div class="header-row">
        <h1>VIBETRACK</h1>
        <button class="theme-toggle" id="themeBtn" onclick="toggleTheme()">🌙</button>
    </div>

    <div class="container">
        <div class="progress-container"><div id="progressBar"></div></div>

        <div class="input-area">
            <select id="habitSelect">
                <option value="">Choose a habit...</option>
                <option value="💧 Drink Water">💧 Drink Water</option>
                <option value="📖 Read 10 Pages">📖 Read 10 Pages</option>
                <option value="🧘 Meditation">🧘 Meditation</option>
                <option value="🏋️ Workout">🏋️ Workout</option>
                <option value="CUSTOM">➕ Custom...</option>
            </select>
            <input type="text" id="habitInput" placeholder="Enter custom habit..." style="display:none;">
            <button id="add-btn">ADD HABIT</button>
        </div>

        <div id="habitList"></div>
        <center><button class="reset-btn" onclick="resetDay()">Reset for Tomorrow</button></center>
    </div>

    <script>
        const select = document.getElementById('habitSelect');
        const input = document.getElementById('habitInput');
        const btn = document.getElementById('add-btn');
        const list = document.getElementById('habitList');
        const prog = document.getElementById('progressBar');
        const themeBtn = document.getElementById('themeBtn');

        let habits = JSON.parse(localStorage.getItem('vibeHabits')) || [];
        let currentTheme = localStorage.getItem('vibeTheme') || 'dark';

        // Apply theme on load
        document.documentElement.setAttribute('data-theme', currentTheme);
        themeBtn.innerText = currentTheme === 'dark' ? '🌙' : '☀️';

        function toggleTheme() {
            currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', currentTheme);
            themeBtn.innerText = currentTheme === 'dark' ? '🌙' : '☀️';
            localStorage.setItem('vibeTheme', currentTheme);
        }

        select.addEventListener('change', () => {
            input.style.display = (select.value === 'CUSTOM') ? 'block' : 'none';
        });

        function updateProgress() {
            if (habits.length === 0) { prog.style.width = '0%'; return; }
            const done = habits.filter(h => h.completed).length;
            const percentage = (done / habits.length) * 100;
            prog.style.width = percentage + '%';
            if (percentage === 100 && habits.length > 0) {
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#ff6600', '#ffffff'] });
            }
        }

        function render() {
            list.innerHTML = '';
            habits.forEach((h, i) => {
                const el = document.createElement('div');
                el.className = `habit-item ${h.completed ? 'completed' : ''}`;
                el.innerHTML = `
                    <button class="check-btn" onclick="toggle(${i})">${h.completed ? '✓' : ''}</button>
                    <span class="habit-text">${h.text}</span>
                    <button class="del-btn" onclick="removeHabit(${i})">✕</button>
                `;
                list.appendChild(el);
            });
            localStorage.setItem('vibeHabits', JSON.stringify(habits));
            updateProgress();
        }

        btn.onclick = () => {
            let val = select.value === 'CUSTOM' ? input.value : select.value;
            if (val && val !== 'CUSTOM') {
                habits.push({text: val, completed: false});
                input.value = ''; select.value = ''; input.style.display = 'none';
                render();
            }
        };

        window.toggle = (i) => { habits[i].completed = !habits[i].completed; render(); };
        window.removeHabit = (i) => { if(confirm("Delete?")) { habits.splice(i, 1); render(); } };
        window.resetDay = () => { habits.forEach(h => h.completed = false); render(); };

        render();
    </script>
</body>
</html>
