<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VibeTrack Elite</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://img.icons8.com/ios-filled/512/ff6600/flash-on.png">

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --bg: #0c0c0c;
            --container-bg: rgba(24, 24, 24, 0.88);
            --item-bg: rgba(255, 255, 255, 0.05);
            --text: #ffffff;
            --orange: #ff6600;
            --border: rgba(255, 255, 255, 0.1);
            --overlay: rgba(0, 0, 0, 0.6);
        }

        [data-theme="light"] {
            --bg: #f2f2f7;
            --container-bg: rgba(255, 255, 255, 0.95);
            --item-bg: rgba(0, 0, 0, 0.04);
            --text: #1c1c1e;
            --border: rgba(0, 0, 0, 0.1);
            --overlay: rgba(255, 255, 255, 0.3);
        }

        body {
            background-color: var(--bg);
            background-size: cover; background-position: center; background-attachment: fixed;
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; padding: env(safe-area-inset-top) 20px 40px 20px; margin: 0;
            transition: background 0.5s ease;
        }

        body.has-photo::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--overlay); z-index: -1;
        }

        .container { 
            width: 100%; max-width: 440px; z-index: 10; margin-top: 50px;
            background: var(--container-bg); padding: 35px; border-radius: 40px; 
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); 
            border: 1px solid var(--border); box-shadow: 0 40px 80px rgba(0,0,0,0.5);
        }

        /* THE 200% LOGO */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 35px; }
        .logo-wrap { display: flex; align-items: center; gap: 0px; }
        .logo-icon { fill: var(--orange); width: 48px; height: 48px; }
        .logo-text { color: var(--text); font-size: 46px; font-weight: 400; letter-spacing: -2.5px; margin: 0; line-height: 1; }
        .logo-highlight { color: var(--orange); font-weight: 900; text-transform: uppercase; letter-spacing: -1.5px; }

        .streak-display { display: flex; align-items: center; gap: 6px; color: var(--orange); font-weight: 800; font-size: 20px; }

        .progress-bar-wrap { background: var(--item-bg); height: 8px; border-radius: 10px; margin-bottom: 35px; overflow: hidden; }
        #progressBar { background: var(--orange); height: 100%; width: 0%; transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1); }

        select, input, #add-btn { 
            background: var(--item-bg); border: 1px solid var(--border); color: var(--text); 
            padding: 18px; border-radius: 18px; width: 100%; font-size: 17px; outline: none; margin-bottom: 12px;
            box-sizing: border-box;
        }
        #add-btn { background: var(--orange); color: white; font-weight: 800; border: none; cursor: pointer; text-transform: uppercase; letter-spacing: 1.5px; margin-top: 5px; }

        /* LIST STYLING */
        .habit-item { 
            background: var(--item-bg); padding: 20px; border-radius: 22px; margin-bottom: 15px; 
            display: flex; align-items: center; border: 1px solid var(--border); 
            animation: slideIn 0.4s ease-out backwards;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .habit-icon-wrap { color: var(--text); width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; }
        .habit-text { flex-grow: 1; margin-left: 18px; font-weight: 600; font-size: 18px; letter-spacing: -0.3px; }
        .habit-item.completed { opacity: 0.3; filter: grayscale(1); }

        .check-btn { 
            width: 30px; height: 30px; border: 2.5px solid var(--border); border-radius: 10px; 
            background: none; display: flex; align-items: center; justify-content: center; transition: 0.3s;
        }
        .completed .check-btn { background: var(--orange); border-color: var(--orange); }

        .footer { margin-top: 40px; display: flex; gap: 25px; }
        .icon-toggle {
            background: var(--container-bg); border: 1px solid var(--border); color: var(--text);
            width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(15px); cursor: pointer;
        }
    </style>
</head>
<body id="mainBody">

    <div class="container">
        <div class="header">
            <div class="logo-wrap">
                <svg class="logo-icon" viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
                <h1 class="logo-text"><span class="logo-highlight">VIBE</span>track</h1>
            </div>
            <div class="streak-display">
                <i data-lucide="zap" style="fill:var(--orange); width:22px; height:22px;"></i>
                <span id="streakNum">0</span>
            </div>
        </div>

        <div class="progress-bar-wrap"><div id="progressBar"></div></div>
        
        <div class="input-section">
            <select id="hSelect">
                <option value="">Choose Habit...</option>
                <option value="droplets|Hydration">💧 Hydration</option>
                <option value="book-open|Reading">📖 Reading</option>
                <option value="wind|Meditation">🧘 Meditation</option>
                <option value="dumbbell|Training">🏋️ Training</option>
                <option value="sparkles|CUSTOM">✨ Custom...</option>
            </select>
            <input type="text" id="hInput" style="display:none;" placeholder="Enter custom habit name...">
            <button id="add-btn">Add to Routine</button>
        </div>

        <div id="hList"></div>
    </div>

    <div class="footer">
        <button class="icon-toggle" onclick="toggleTheme()"><i data-lucide="moon"></i></button>
        <button class="icon-toggle" onclick="togglePhoto()"><i data-lucide="image"></i></button>
        <button class="icon-toggle" onclick="resetDay()"><i data-lucide="rotate-ccw"></i></button>
    </div>

    <script>
        let habits = JSON.parse(localStorage.getItem('vibeHabits')) || [];
        let theme = localStorage.getItem('vibeTheme') || 'dark';
        let usePhoto = localStorage.getItem('vibePhoto') === 'true';
        let streak = parseInt(localStorage.getItem('vibeStreak')) || 0;

        function refreshIcons() {
            if (window.lucide) {
                lucide.createIcons();
            }
        }

        function updateUI() {
            document.documentElement.setAttribute('data-theme', theme);
            const body = document.getElementById('mainBody');
            if (usePhoto) {
                body.classList.add('has-photo');
                body.style.backgroundImage = `url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=1600&q=80')`;
            } else {
                body.classList.remove('has-photo');
                body.style.backgroundImage = 'none';
            }
            document.getElementById('streakNum').innerText = streak;
            refreshIcons();
        }

        const hSelect = document.getElementById('hSelect');
        const hInput = document.getElementById('hInput');
        hSelect.onchange = () => hInput.style.display = hSelect.value.includes('CUSTOM') ? 'block' : 'none';

        document.getElementById('add-btn').onclick = () => {
            let val = hSelect.value;
            if(!val) return;
            let icon, text;
            if(val.includes('CUSTOM')) { icon = "sparkles"; text = hInput.value || "New Habit"; }
            else { [icon, text] = val.split('|'); }
            
            habits.push({icon: icon, text: text, completed: false}); 
            render(); 
            hInput.value=''; hSelect.value=''; hInput.style.display='none'; 
        };

        function render() {
            const list = document.getElementById('hList');
            list.innerHTML = '';
            habits.forEach((h, i) => {
                const el = document.createElement('div');
                el.className = `habit-item ${h.completed ? 'completed' : ''}`;
                el.style.animationDelay = (i * 0.05) + 's';
                el.innerHTML = `
                    <button class="check-btn" onclick="toggle(${i})">
                        ${h.completed ? '<i data-lucide="check" style="stroke:white; width:18px; height:18px;"></i>' : ''}
                    </button>
                    <div class="habit-icon-wrap"><i data-lucide="${h.icon || 'circle'}"></i></div>
                    <span class="habit-text">${h.text}</span>
                    <button style="background:none; border:none; color:#777; cursor:pointer;" onclick="removeHabit(${i})"><i data-lucide="trash-2" style="width:18px;"></i></button>
                `;
                list.appendChild(el);
            });
            const done = habits.filter(h => h.completed).length;
            const percent = habits.length ? (done/habits.length)*100 : 0;
            document.getElementById('progressBar').style.width = percent + '%';
            if(percent === 100 && habits.length > 0) confetti({particleCount:100, spread:70, origin:{y:0.8}, colors:['#ff6600']});
            localStorage.setItem('vibeHabits', JSON.stringify(habits));
            refreshIcons();
        }

        window.toggle = (i) => { habits[i].completed = !habits[i].completed; render(); };
        window.removeHabit = (i) => { habits.splice(i, 1); render(); };
        window.toggleTheme = () => { theme = theme === 'dark' ? 'light' : 'dark'; localStorage.setItem('vibeTheme', theme); updateUI(); };
        window.togglePhoto = () => { usePhoto = !usePhoto; localStorage.setItem('vibePhoto', usePhoto); updateUI(); };
        window.resetDay = () => { habits.forEach(h => h.completed = false); render(); };

        // Initial setup
        document.addEventListener('DOMContentLoaded', () => {
            updateUI();
            render();
        });
        // Extra check for script loading
        window.onload = refreshIcons;
    </script>
</body>
</html>
