<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIBEtrack Titan</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://img.icons8.com/ios-filled/512/ff6600/flash-on.png">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --bg: #0c0c0c;
            --container-bg: rgba(28, 28, 30, 0.94);
            --item-bg: rgba(255, 255, 255, 0.08);
            --text: #ffffff;
            --orange: #ff6600;
            --border: rgba(255, 255, 255, 0.15);
            --overlay: rgba(0, 0, 0, 0.5);
        }

        [data-theme="light"] {
            --bg: #f2f2f7;
            --container-bg: rgba(255, 255, 255, 0.98);
            --item-bg: rgba(0, 0, 0, 0.05);
            --text: #1c1c1e;
            --border: rgba(0, 0, 0, 0.12);
            --overlay: rgba(255, 255, 255, 0.2);
        }

        body {
            background-color: var(--bg);
            background-size: cover; background-position: center; background-attachment: fixed;
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; padding: env(safe-area-inset-top) 20px 40px 20px; margin: 0;
        }

        body.has-photo::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--overlay); z-index: -1;
        }

        .container { 
            width: 100%; max-width: 480px; z-index: 10; margin-top: 60px;
            background: var(--container-bg); padding: 40px; border-radius: 50px; 
            backdrop-filter: blur(50px); -webkit-backdrop-filter: blur(50px); 
            border: 1px solid var(--border); box-shadow: 0 40px 80px rgba(0,0,0,0.6);
        }

        /* 200% SUPREME LOGO */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .logo-wrap { display: flex; align-items: center; gap: 0px; }
        .logo-icon { fill: var(--orange); width: 56px; height: 56px; margin-right: -2px; }
        .logo-text { color: var(--text); font-size: 56px; font-weight: 400; letter-spacing: -4px; margin: 0; line-height: 1; }
        .logo-highlight { color: var(--orange); font-weight: 900; text-transform: uppercase; letter-spacing: -2px; }

        .streak-display { display: flex; align-items: center; gap: 6px; color: var(--orange); font-weight: 800; font-size: 26px; }

        .progress-bar-wrap { background: var(--item-bg); height: 12px; border-radius: 20px; margin-bottom: 40px; overflow: hidden; }
        #progressBar { background: var(--orange); height: 100%; width: 0%; transition: width 0.8s cubic-bezier(0.16, 1, 0.3, 1); }

        select, input, #add-btn { 
            background: var(--item-bg); border: 1px solid var(--border); color: var(--text); 
            padding: 22px; border-radius: 22px; width: 100%; font-size: 19px; outline: none; margin-bottom: 15px;
            box-sizing: border-box; -webkit-appearance: none;
        }

        #add-btn { background: var(--orange); color: white; font-weight: 900; border: none; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; }

        .habit-item { 
            background: var(--item-bg); padding: 24px; border-radius: 28px; margin-bottom: 15px; 
            display: flex; align-items: center; border: 1px solid var(--border); 
            animation: slideIn 0.4s ease-out backwards;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* INCREASED SVG SIZES & FIXED CLIPPING */
        .habit-icon-svg { width: 30px; height: 30px; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; fill: none; flex-shrink: 0; }
        .habit-text { flex-grow: 1; margin: 0 20px; font-weight: 600; font-size: 22px; letter-spacing: -0.5px; }
        
        .habit-item.completed { opacity: 0.25; filter: grayscale(1); }

        .check-btn { 
            width: 38px; height: 38px; border: 3px solid var(--border); border-radius: 14px; 
            background: none; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .completed .check-btn { background: var(--orange); border-color: var(--orange); }

        /* FIXED TRASH AREA */
        .del-btn { background: none; border: none; color: #777; cursor: pointer; padding: 10px; margin-right: -10px; display: flex; align-items: center; justify-content: center; }

        .footer { margin-top: 50px; display: flex; gap: 40px; }
        .icon-toggle {
            background: var(--container-bg); border: 1px solid var(--border); color: var(--text);
            width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body id="mainBody">

    <div class="container">
        <div class="header">
            <div class="logo-wrap">
                <svg class="logo-icon" viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
                <h1 class="logo-text"><span class="logo-highlight">VIBE</span>track</h1>
            </div>
            <div class="streak-display">
                <svg width="26" height="26" fill="var(--orange)" viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
                <span id="streakNum">0</span>
            </div>
        </div>

        <div class="progress-bar-wrap"><div id="progressBar"></div></div>
        
        <div class="input-section">
            <select id="hSelect">
                <option value="">Choose Habit...</option>
                <option value="DROPS|Hydration">💧 Hydration</option>
                <option value="BOOK|Reading">📖 Reading</option>
                <option value="ZEN|Meditation">🧘 Meditation</option>
                <option value="LIFT|Training">🏋️ Training</option>
                <option value="MAGIC|CUSTOM">✨ Custom...</option>
            </select>
            <input type="text" id="hInput" style="display:none;" placeholder="Custom Habit Name">
            <button id="add-btn">Add to Routine</button>
        </div>

        <div id="hList"></div>
    </div>

    <div class="footer">
        <button class="icon-toggle" onclick="toggleTheme()">
            <svg class="habit-icon-svg" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
        </button>
        <button class="icon-toggle" onclick="togglePhoto()">
            <svg class="habit-icon-svg" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
        </button>
        <button class="icon-toggle" onclick="resetDay()">
            <svg class="habit-icon-svg" viewBox="0 0 24 24"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
        </button>
    </div>

    <script>
        // REDEFINED SVG PATHS FOR BETTER RENDERING
        const SVGS = {
            DROPS: '<path d="M12 22a7 7 0 0 0 7-7c0-2-1-3.9-3-5.5s-3.5-4-4-6.5c-.5 2.5-2 4.9-4 6.5s-3 3.5-3 5.5a7 7 0 0 0 7 7Z"/>',
            BOOK: '<path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>',
            ZEN: '<circle cx="12" cy="12" r="9"/><path d="M12 8v8M8 12h8"/>',
            LIFT: '<path d="m6.5 6.5 11 11M21 21l-1-1M3 3l1 1m14 18 4-4M2 6l4-4M3 10l7-7m4 18 7-7"/>',
            MAGIC: '<path d="M12 3l1.912 5.813a2 2 0 001.275 1.275L21 12l-5.813 1.912a2 2 0 00-1.275 1.275L12 21l-1.912-5.813a2 2 0 00-1.275-1.275L3 12l5.813-1.912a2 2 0 001.275-1.275L12 3Z"/>',
            CHECK: '<path d="M20 6L9 17l-5-5"/>',
            DEL: '<path d="M18 6L6 18M6 6l12 12"/>' // Simple X for trash to prevent clipping
        };

        let habits = JSON.parse(localStorage.getItem('vibeHabits')) || [];
        let theme = localStorage.getItem('vibeTheme') || 'dark';
        let usePhoto = localStorage.getItem('vibePhoto') === 'true';
        let streak = parseInt(localStorage.getItem('vibeStreak')) || 0;

        function updateUI() {
            document.documentElement.setAttribute('data-theme', theme);
            const body = document.getElementById('mainBody');
            body.style.backgroundImage = usePhoto ? `url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=1600&q=80')` : 'none';
            body.classList.toggle('has-photo', usePhoto);
            document.getElementById('streakNum').innerText = streak;
        }

        const hSelect = document.getElementById('hSelect');
        const hInput = document.getElementById('hInput');
        hSelect.onchange = () => hInput.style.display = hSelect.value.includes('MAGIC') ? 'block' : 'none';

        document.getElementById('add-btn').onclick = () => {
            if(!hSelect.value) return;
            let [key, text] = hSelect.value.split('|');
            if(key === 'MAGIC') text = hInput.value || "Goal";
            habits.push({icon: key, text: text, completed: false}); 
            render(); hInput.value=''; hSelect.value=''; hInput.style.display='none'; 
        };

        function render() {
            const list = document.getElementById('hList');
            list.innerHTML = '';
            habits.forEach((h, i) => {
                const el = document.createElement('div');
                el.className = `habit-item ${h.completed ? 'completed' : ''}`;
                el.innerHTML = `
                    <button class="check-btn" onclick="toggle(${i})">
                        ${h.completed ? `<svg class="habit-icon-svg" style="stroke:white; width:22px;">${SVGS.CHECK}</svg>` : ''}
                    </button>
                    <div style="display:flex; align-items:center;">
                        <svg class="habit-icon-svg" style="margin-left:15px;">${SVGS[h.icon] || SVGS.MAGIC}</svg>
                    </div>
                    <span class="habit-text">${h.text}</span>
                    <button class="del-btn" onclick="removeHabit(${i})">
                        <svg class="habit-icon-svg" style="width:20px; color:#555;">${SVGS.DEL}</svg>
                    </button>
                `;
                list.appendChild(el);
            });
            const percent = habits.length ? (habits.filter(h => h.completed).length / habits.length) * 100 : 0;
            document.getElementById('progressBar').style.width = percent + '%';
            if(percent === 100 && habits.length > 0) confetti({particleCount:100, spread:70, origin:{y:0.8}, colors:['#ff6600']});
            localStorage.setItem('vibeHabits', JSON.stringify(habits));
        }

        window.toggle = (i) => { habits[i].completed = !habits[i].completed; render(); };
        window.removeHabit = (i) => { habits.splice(i, 1); render(); };
        window.toggleTheme = () => { theme = theme === 'dark' ? 'light' : 'dark'; localStorage.setItem('vibeTheme', theme); updateUI(); };
        window.togglePhoto = () => { usePhoto = !usePhoto; localStorage.setItem('vibePhoto', usePhoto); updateUI(); };
        window.resetDay = () => { habits.forEach(h => h.completed = false); render(); };

        updateUI(); render();
    </script>
</body>
</html>
