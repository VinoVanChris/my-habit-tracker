<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VibeTrack</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://img.icons8.com/ios-filled/512/ff6600/flash-on.png">

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --bg: #0c0c0c;
            --container-bg: rgba(24, 24, 24, 0.85);
            --item-bg: rgba(255, 255, 255, 0.04);
            --text: #ffffff;
            --orange: #ff6600;
            --border: rgba(255, 255, 255, 0.1);
            --overlay: rgba(0, 0, 0, 0.55);
        }

        [data-theme="light"] {
            --bg: #f2f2f7;
            --container-bg: rgba(255, 255, 255, 0.9);
            --item-bg: rgba(0, 0, 0, 0.03);
            --text: #1c1c1e;
            --border: rgba(0, 0, 0, 0.08);
            --overlay: rgba(255, 255, 255, 0.2);
        }

        /* ANIMATIONS */
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulseGlow {
            0% { box-shadow: 0 0 5px var(--orange); }
            50% { box-shadow: 0 0 20px var(--orange); }
            100% { box-shadow: 0 0 5px var(--orange); }
        }

        body {
            background-color: var(--bg);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter", sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: env(safe-area-inset-top) 20px 40px 20px;
            margin: 0;
            transition: background 0.5s ease;
        }

        body.has-photo::before {
            content: "";
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--overlay); z-index: -1;
        }

        .container { 
            width: 100%; max-width: 400px; z-index: 10; margin-top: 40px;
            background: var(--container-bg); padding: 30px; border-radius: 35px; 
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); 
            border: 1px solid var(--border);
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        
        /* LOGO STYLING WITH TYPOGRAPHY MIX */
        .logo-wrap { display: flex; align-items: center; gap: 8px; }
        .logo-text { color: var(--text); font-size: 20px; font-weight: 400; letter-spacing: -0.5px; margin: 0; }
        .logo-highlight { color: var(--orange); font-weight: 800; text-transform: uppercase; letter-spacing: 0px; }

        .streak-display { display: flex; align-items: center; gap: 5px; color: var(--orange); font-weight: 700; font-size: 16px; }

        .progress-bar-wrap { background: var(--item-bg); height: 6px; border-radius: 10px; margin-bottom: 30px; overflow: hidden; }
        #progressBar { background: var(--orange); height: 100%; width: 0%; transition: width 1s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .full-glow #progressBar { animation: pulseGlow 2s infinite; }

        select, input, #add-btn { 
            background: var(--item-bg); border: 1px solid var(--border); color: var(--text); 
            padding: 16px; border-radius: 16px; width: 100%; font-size: 15px; outline: none; transition: all 0.2s;
        }
        select { -webkit-appearance: none; appearance: none; } /* Native select styling fix */
        
        #add-btn { background: var(--orange); color: white; font-weight: 700; margin: 15px 0 25px 0; cursor: pointer; border: none; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        #add-btn:active { transform: scale(0.96); }

        .habit-item { 
            background: var(--item-bg); padding: 18px; border-radius: 20px; margin-bottom: 12px; 
            display: flex; align-items: center; border: 1px solid var(--border); 
            animation: slideIn 0.4s ease backwards;
        }
        .habit-text { flex-grow: 1; margin-left: 15px; font-weight: 500; letter-spacing: -0.3px; font-size: 16px; }
        .habit-item.completed { opacity: 0.3; filter: grayscale(1); }

        .check-btn { 
            width: 26px; height: 26px; border: 2px solid var(--border); border-radius: 8px; 
            background: none; display: flex; align-items: center; justify-content: center; transition: 0.2s;
        }
        .completed .check-btn { background: var(--orange); border-color: var(--orange); }

        /* Minimal SVG Icon styling */
        .icon-svg { fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
        .logo-icon { fill: var(--orange); stroke: none; } /* Special style for solid logo */

        .footer { margin-top: 30px; display: flex; gap: 20px; }
        .icon-toggle {
            background: var(--container-bg); border: 1px solid var(--border); color: var(--text);
            width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            cursor: pointer;
        }
    </style>
</head>
<body id="mainBody">

    <div class="container">
        <div class="header">
            <div class="logo-wrap">
                <svg class="logo-icon" width="20" height="20" viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
                <h1 class="logo-text"><span class="logo-highlight">VIBE</span>track</h1>
            </div>

            <div class="streak-display">
                <svg class="icon-svg" width="20" height="20" viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
                <span id="streakNum">0</span>
            </div>
        </div>

        <div id="progWrap" class="progress-bar-wrap"><div id="progressBar"></div></div>
        
        <div class="input-section">
            <select id="hSelect">
                <option value="">Choose Habit</option>
                <option value="Hydration">Hydration</option>
                <option value="Training">Training</option>
                <option value="Reading">Reading</option>
                <option value="Deep Work">Deep Work</option>
                <option value="CUSTOM">Custom...</option>
            </select>
            <input type="text" id="hInput" style="display:none;" placeholder="What's the goal?">
            <button id="add-btn">Add to Routine</button>
        </div>

        <div id="hList"></div>
    </div>

    <div class="footer">
        <button class="icon-toggle" onclick="toggleTheme()"><svg class="icon-svg" width="20" height="20" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg></button>
        <button class="icon-toggle" onclick="togglePhoto()"><svg class="icon-svg" width="20" height="20" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg></button>
        <button class="icon-toggle" onclick="resetDay()"><svg class="icon-svg" width="20" height="20" viewBox="0 0 24 24"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg></button>
    </div>

    <script>
        let habits = JSON.parse(localStorage.getItem('vibeHabits')) || [];
        let theme = localStorage.getItem('vibeTheme') || 'dark';
        let usePhoto = localStorage.getItem('vibePhoto') === 'true';
        let streak = parseInt(localStorage.getItem('vibeStreak')) || 0;
        let lastCompletionDate = localStorage.getItem('vibeLastDate') || "";

        function updateUI() {
            document.documentElement.setAttribute('data-theme', theme);
            const body = document.getElementById('mainBody');
            if (usePhoto) {
                body.classList.add('has-photo');
                // Neutral mountain landscape
                body.style.backgroundImage = `url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=1600&q=80')`;
            } else {
                body.classList.remove('has-photo');
                body.style.backgroundImage = 'none';
            }
            document.getElementById('streakNum').innerText = streak;
        }

        function checkStreak(fullCompletion) {
            const today = new Date().toDateString();
            if (fullCompletion && lastCompletionDate !== today) {
                const yesterday = new Date();
                yesterday.setDate(yesterday.getDate() - 1);
                if (lastCompletionDate === yesterday.toDateString()) streak++;
                else if (lastCompletionDate === "") streak = 1;
                lastCompletionDate = today;
                localStorage.setItem('vibeStreak', streak);
                localStorage.setItem('vibeLastDate', lastCompletionDate);
            }
            updateUI();
        }

        function toggleTheme() { theme = theme === 'dark' ? 'light' : 'dark'; localStorage.setItem('vibeTheme', theme); updateUI(); }
        function togglePhoto() { usePhoto = !usePhoto; localStorage.setItem('vibePhoto', usePhoto); updateUI(); }

        const hSelect = document.getElementById('hSelect');
        const hInput = document.getElementById('hInput');
        hSelect.onchange = () => hInput.style.display = hSelect.value === 'CUSTOM' ? 'block' : 'none';

        document.getElementById('add-btn').onclick = () => {
            let val = hSelect.value === 'CUSTOM' ? hInput.value : hSelect.value;
            if(val && val !== 'Choose Habit') { 
                habits.push({text: val, completed: false}); 
                render(); 
                hInput.value=''; hSelect.value=''; hInput.style.display='none'; 
            }
        };

        function render() {
            const list = document.getElementById('hList');
            list.innerHTML = '';
            habits.forEach((h, i) => {
                const el = document.createElement('div');
                el.className = `habit-item ${h.completed ? 'completed' : ''}`;
                // Staggered animation delay
                el.style.animationDelay = (i * 0.05) + 's';
                el.innerHTML = `
                    <button class="check-btn" onclick="toggle(${i})">
                        ${h.completed ? '<svg class="icon-svg" style="color:white; stroke-width:3;" width="16" height="16" viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>' : ''}
                    </button>
                    <span class="habit-text">${h.text}</span>
                    <button style="background:none; border:none; color:#555; cursor:pointer;" onclick="removeHabit(${i})">✕</button>
                `;
                list.appendChild(el);
            });
            const done = habits.filter(h => h.completed).length;
            const percent = habits.length ? (done/habits.length)*100 : 0;
            document.getElementById('progressBar').style.width = percent + '%';
            
            if(percent === 100 && habits.length > 0) {
                document.getElementById('progWrap').classList.add('full-glow');
                confetti({particleCount:100, spread:60, origin:{y:0.7}, colors:['#ff6600']});
                checkStreak(true);
            } else {
                document.getElementById('progWrap').classList.remove('full-glow');
            }
            localStorage.setItem('vibeHabits', JSON.stringify(habits));
        }

        window.toggle = (i) => { habits[i].completed = !habits[i].completed; render(); };
        window.removeHabit = (i) => { if(confirm("Remove habit?")) { habits.splice(i, 1); render(); } };
        window.resetDay = () => { if(confirm("Reset all checks?")) { habits.forEach(h => h.completed = false); render(); } };

        updateUI();
        render();
    </script>
</body>
</html>
