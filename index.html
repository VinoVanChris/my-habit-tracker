<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VibeTrack Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --charcoal: #1a1a1a;
            --orange: #ff6600;
            --white: #ffffff;
            --grey: #262626;
            --red: #ff4444;
        }

        body {
            background-color: var(--charcoal);
            color: var(--white);
            font-family: -apple-system, system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: env(safe-area-inset-top) 20px 40px 20px;
            margin: 0;
        }

        .container { width: 100%; max-width: 400px; margin-top: 20px; }
        h1 { color: var(--orange); text-align: center; letter-spacing: 2px; font-size: 28px; margin-bottom: 10px; }
        
        .progress-container {
            background: #333;
            height: 12px;
            border-radius: 6px;
            margin-bottom: 25px;
            overflow: hidden;
            border: 1px solid #444;
        }

        #progressBar {
            background: linear-gradient(90deg, var(--orange), #ff9900);
            height: 100%;
            width: 0%;
            transition: width 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 15px rgba(255, 102, 0, 0.4);
        }

        .input-area {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 25px;
            background: #222;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        select, input {
            background: var(--grey);
            border: 1px solid #444;
            color: white;
            padding: 15px;
            border-radius: 10px;
            font-size: 16px;
            -webkit-appearance: none; /* Fixes iOS styling */
        }

        button#add-btn {
            background: var(--orange);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
            transition: transform 0.1s;
        }
        button#add-btn:active { transform: scale(0.98); }

        .habit-item {
            background: var(--grey);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            border-left: 5px solid var(--orange);
            transition: all 0.3s ease;
        }

        .habit-text { flex-grow: 1; margin-left: 15px; font-size: 17px; }
        .habit-item.completed { opacity: 0.4; border-left-color: #444; transform: scale(0.98); }

        .btn-group { display: flex; gap: 8px; }
        
        .del-btn { 
            background: #333; 
            border: none; 
            color: var(--red); 
            border-radius: 8px; 
            padding: 8px 12px;
            font-size: 11px;
            font-weight: bold;
        }

        .check-btn { 
            background: none; 
            border: 2px solid var(--orange); 
            color: var(--orange); 
            border-radius: 12px; 
            width: 40px; height: 40px; 
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .reset-area {
            margin-top: 30px;
            text-align: center;
        }
        .reset-btn {
            background: none;
            border: 1px solid #444;
            color: #888;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>VIBETRACK</h1>
        <div class="progress-container"><div id="progressBar"></div></div>

        <div class="input-area">
            <select id="habitSelect">
                <option value="">Choose a habit...</option>
                <option value="💧 Drink Water">💧 Drink Water</option>
                <option value="📖 Read 10 Pages">📖 Read 10 Pages</option>
                <option value="🧘 Meditation">🧘 Meditation</option>
                <option value="🏋️ Workout">🏋️ Workout</option>
                <option value="🍎 Eat Healthy">🍎 Eat Healthy</option>
                <option value="CUSTOM">➕ Custom...</option>
            </select>
            <input type="text" id="habitInput" placeholder="Enter custom habit..." style="display:none;">
            <button id="add-btn">ADD HABIT</button>
        </div>

        <div id="habitList"></div>

        <div class="reset-area">
            <button class="reset-btn" onclick="resetDay()">Reset Checks for Tomorrow</button>
        </div>
    </div>

    <script>
        const select = document.getElementById('habitSelect');
        const input = document.getElementById('habitInput');
        const btn = document.getElementById('add-btn');
        const list = document.getElementById('habitList');
        const prog = document.getElementById('progressBar');

        let habits = JSON.parse(localStorage.getItem('vibeHabits')) || [];

        select.addEventListener('change', () => {
            input.style.display = (select.value === 'CUSTOM') ? 'block' : 'none';
        });

        function fireConfetti() {
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#ff6600', '#ffffff', '#ffbb00']
            });
        }

        function updateProgress() {
            if (habits.length === 0) { prog.style.width = '0%'; return; }
            const done = habits.filter(h => h.completed).length;
            const percentage = (done / habits.length) * 100;
            prog.style.width = percentage + '%';

            // Trigger confetti if we just hit 100%
            if (percentage === 100 && habits.length > 0) {
                fireConfetti();
            }
        }

        function render() {
            list.innerHTML = '';
            habits.forEach((h, i) => {
                const el = document.createElement('div');
                el.className = `habit-item ${h.completed ? 'completed' : ''}`;
                el.innerHTML = `
                    <button class="check-btn" onclick="toggle(${i})">${h.completed ? '✓' : ''}</button>
                    <span class="habit-text">${h.text}</span>
                    <div class="btn-group">
                        <button class="del-btn" onclick="removeHabit(${i})">DELETE</button>
                    </div>
                `;
                list.appendChild(el);
            });
            localStorage.setItem('vibeHabits', JSON.stringify(habits));
            updateProgress();
        }

        btn.onclick = () => {
            let val = select.value === 'CUSTOM' ? input.value : select.value;
            if (val && val !== 'CUSTOM') {
                habits.push({text: val, completed: false});
                input.value = ''; select.value = ''; input.style.display = 'none';
                render();
            }
        };

        window.toggle = (i) => { 
            habits[i].completed = !habits[i].completed; 
            render(); 
        };
        
        window.removeHabit = (i) => {
            if(confirm("Delete this habit?")) {
                habits.splice(i, 1);
                render();
            }
        };

        window.resetDay = () => {
            habits.forEach(h => h.completed = false);
            render();
        };

        render();
    </script>
</body>
</html>
