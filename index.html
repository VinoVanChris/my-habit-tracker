<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VibeTrack</title>
    <style>
        body {
            background-color: #1a1a1a; 
            color: #ffffff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
        }

        h1 {
            color: #ff6600; 
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
            font-size: 24px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            width: 100%;
            max-width: 400px;
        }

        input {
            flex-grow: 1;
            background: #333;
            border: 1px solid #444;
            color: white;
            padding: 15px;
            border-radius: 12px;
            outline: none;
            font-size: 16px; /* Prevents iOS zoom on focus */
        }

        button#add-btn {
            background-color: #ff6600;
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
        }

        .habit-list {
            width: 100%;
            max-width: 400px;
        }

        .habit-item {
            background: #262626;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 5px solid #ff6600;
            transition: all 0.3s ease;
        }

        .habit-item.completed {
            opacity: 0.4;
            border-left: 5px solid #444;
        }

        .habit-text {
            flex-grow: 1;
            margin-right: 10px;
        }

        .completed .habit-text {
            text-decoration: line-through;
        }

        .actions {
            display: flex;
            gap: 8px;
        }

        .check-btn, .delete-btn {
            background: none;
            border: 2px solid #ff6600;
            color: #ff6600;
            border-radius: 8px;
            padding: 5px 10px;
            cursor: pointer;
            font-weight: bold;
        }

        .delete-btn {
            border-color: #666;
            color: #666;
        }
    </style>
</head>
<body>

    <h1>Daily Habits</h1>

    <div class="input-group">
        <input type="text" id="habitInput" placeholder="New habit..." autocomplete="off">
        <button id="add-btn">ADD</button>
    </div>

    <div class="habit-list" id="habitList"></div>

    <script>
        const input = document.getElementById('habitInput');
        const btn = document.getElementById('add-btn');
        const list = document.getElementById('habitList');

        // 1. Load from LocalStorage on startup
        let habits = JSON.parse(localStorage.getItem('myHabits')) || [];

        function renderHabits() {
            list.innerHTML = '';
            habits.forEach((habit, index) => {
                const habitItem = document.createElement('div');
                habitItem.className = `habit-item ${habit.completed ? 'completed' : ''}`;
                habitItem.innerHTML = `
                    <span class="habit-text">${habit.text}</span>
                    <div class="actions">
                        <button class="check-btn" onclick="toggleHabit(${index})">✓</button>
                        <button class="delete-btn" onclick="deleteHabit(${index})">×</button>
                    </div>
                `;
                list.appendChild(habitItem);
            });
            // 2. Save to LocalStorage whenever we render
            localStorage.setItem('myHabits', JSON.stringify(habits));
        }

        btn.addEventListener('click', () => {
            if (input.value.trim()) {
                habits.push({ text: input.value, completed: false });
                input.value = '';
                renderHabits();
            }
        });

        window.toggleHabit = (index) => {
            habits[index].completed = !habits[index].completed;
            renderHabits();
        };

        window.deleteHabit = (index) => {
            habits.splice(index, 1);
            renderHabits();
        };

        // Initial render
        renderHabits();
    </script>
</body>
</html>
